# 前端 Docker Compose 配置
# 使用方式: docker-compose up -d

services:
  frontend:
    build:
      context: ../..
      dockerfile: frontend/deploy/Dockerfile
    container_name: eucal_frontend
    restart: unless-stopped
    environment:
      # API 地址（使用 Docker 网络服务名）
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      # 运行环境
      NODE_ENV: production
      # 禁用遥测
      NEXT_TELEMETRY_DISABLED: "1"

    ports:
      - "${FRONTEND_PORT:-80}:80"

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    # 依赖关系
    depends_on:
      backend:
        condition: service_healthy

    # 网络配置
    networks:
      - eucal_network

networks:
  eucal_network:
    name: eucal_network
    external: true
