# Eucal AI 中文前端 Docker Compose 配置
#
# 使用方式:
#   1. cp .env.example .env  并修改配置
#   2. docker compose up -d --build
#
# 三节点架构前提条件:
#   - eucal_frontend_network 网络已创建: docker network create eucal_frontend_network
#   - 后端节点的 user-service 通过内网可达 (默认 :8000)
#   - GPU 节点的 router-service 通过内网可达 (默认 :8003)

services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME:-Eucal AI}
        NEXT_PUBLIC_IMAGE_HOSTS: ${NEXT_PUBLIC_IMAGE_HOSTS:-eucal.ai,www.eucal.ai,neofii.fun}
        NEXT_PUBLIC_ROUTER_API_BASE_URL: ${NEXT_PUBLIC_ROUTER_API_BASE_URL:-/router-api/api/v1}
        NEXT_PUBLIC_ROUTER_OPENAI_BASE_URL: ${NEXT_PUBLIC_ROUTER_OPENAI_BASE_URL:-/router-api/v1}
        NEXT_PUBLIC_MODEL_CATALOG_API_BASE_URL: ${NEXT_PUBLIC_MODEL_CATALOG_API_BASE_URL:-}
    image: eucal-frontend-zh:latest
    container_name: eucal_frontend_zh
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: ${API_URL:-http://127.0.0.1:8000}
      ROUTER_API_URL: ${ROUTER_API_URL:-http://127.0.0.1:8003}

    ports:
      # 默认只监听本机，由 Nginx 反代
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    networks:
      - eucal_network

networks:
  eucal_network:
    name: eucal_frontend_network
    external: true
